# Example configuration for TL-Video-Playground
# Copy this file to config.local.yaml and fill in your values
# For detailed documentation, see backend/CONFIG.md
#
# IMPORTANT: Never commit config.local.yaml or config.docker.yaml to git!

# TwelveLabs AI Models (via Amazon Bedrock)
marengo_model_id: "twelvelabs.marengo-embed-3-0-v1:0"  # Video embedding model
pegasus_model_id: "twelvelabs.pegasus-1-2-v1:0"  # Video analysis model

# AWS Configuration
inference_profile_prefix: "eu"  # Cross-region inference profile (us, eu, etc.)
aws_region: "eu-west-1"  # AWS region for all services

# Storage Configuration
s3_bucket_name: "your-bucket-name"  # S3 bucket for video files

# System Limits
max_indexes: 5  # Maximum number of video indexes (1-10)

# Authentication
# Generate hash with: python3 -c 'import bcrypt; print(bcrypt.hashpw("YOUR_PASSWORD".encode(), bcrypt.gensalt()).decode())'
auth_password_hash: "$2b$12$REPLACE_WITH_YOUR_BCRYPT_HASH"

# Environment Settings
environment: "local"

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  file_logging_enabled: true
  level: "INFO"

# ============================================================================
# Theme Configuration
# ============================================================================
theme:
  default_mode: "dark"

# ============================================================================
# Jockey Orchestration Configuration
# ============================================================================
jockey:
  enabled: true
  claude_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
  max_segments_per_query: 10
  max_search_results: 15
  parallel_analysis_limit: 5
  search_cache_ttl: 300
  claude_temperature: 0.7
  claude_max_tokens: 4096
  
  # Web search enrichment (optional)
  web_search_enabled: false
  # Get free API key at https://brave.com/search/api/ (1,000 queries/month free)
  brave_api_key: ""  # Add your Brave API key here if enabling web search

# ============================================================================
# Embedding Job Processor Configuration
# ============================================================================
embedding_processor:
  enabled: true
  polling_interval: 30
  max_concurrent_jobs: 5
  max_retries: 3
  retry_backoff_base: 2

# ============================================================================
# Compliance Analysis Configuration
# ============================================================================
compliance:
  pegasus_temperature: 0.0
