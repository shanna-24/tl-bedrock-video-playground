version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  access:
    format: '%(asctime)s - %(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
  
  access_console:
    class: logging.StreamHandler
    formatter: access
    stream: ext://sys.stdout

loggers:
  uvicorn:
    level: INFO
    handlers:
      - console
    propagate: false
  
  uvicorn.access:
    level: INFO
    handlers:
      - access_console
    propagate: false
  
  uvicorn.error:
    level: INFO
    handlers:
      - console
    propagate: false
  
  # Application loggers - ensure they propagate to root
  api:
    level: INFO
    propagate: true
  
  services:
    level: INFO
    propagate: true
  
  orchestration:
    level: INFO
    propagate: true
  
  aws:
    level: INFO
    propagate: true

root:
  level: INFO
  handlers:
    - console
